name: Build Release

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest
        outputs:
            version: ${{ steps.version.outputs.version }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  submodules: recursive

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: 10.0.x

            - name: Generate Auth File
              shell: pwsh
              env:
                  SECRET_KEY: ${{ secrets.API_AUTH_KEY }}
              run: |
                  $filePath = "${{ github.workspace }}\MemoUploader\Api\ApiSecrets.cs"
                  $content = @"
                  namespace MemoUploader.Api;
                  public class ApiSecrets
                  {
                      public const string AuthKey = "$env:SECRET_KEY";
                  }
                  "@
                  Set-Content -Path $filePath -Value $content

            - name: Install Dalamud
              shell: pwsh
              run: |
                  $targetDir = "${{ github.workspace }}\dalamud_lib"
                  New-Item -ItemType Directory -Force -Path $targetDir

                  $url = "https://github.com/Dalamud-DailyRoutines/Dalamud/releases/latest/download/latest.7z"
                  $archive = "dalamud.7z"

                  Invoke-WebRequest -Uri $url -OutFile $archive
                  7z x $archive "-o$targetDir" -y

            - name: Restore
              run: dotnet restore
              env:
                  DALAMUD_HOME: ${{ github.workspace }}\dalamud_lib

            - name: Build (Release)
              run: dotnet build -c Release --no-restore
              env:
                  DALAMUD_HOME: ${{ github.workspace }}\dalamud_lib

            - name: Read Version
              id: version
              shell: pwsh
              run: |
                  [xml]$csproj = Get-Content MemoUploader/MemoUploader.csproj
                  $version = "$($csproj.Project.PropertyGroup.Version)".Trim()
                  echo "version=$version" >> $env:GITHUB_OUTPUT

            - name: Create Git Tag
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag v${{ steps.version.outputs.version }}
                  git push origin v${{ steps.version.outputs.version }}

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: v${{ steps.version.outputs.version }}
                  files: MemoUploader/bin/Release/MemoUploader/latest.zip

            - name: Generate App Token
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                  app-id: ${{ secrets.APP_ID }}
                  private-key: ${{ secrets.APP_PRIVATE_KEY }}
                  owner: ${{ github.repository_owner }}
                  repositories: 'dalamud-plugins'

            - name: Notify dalamud-plugins
              uses: peter-evans/repository-dispatch@v4
              with:
                  token: ${{ steps.app-token.outputs.token }}
                  repository: open-xiv/dalamud-plugins
                  event-type: plugin-released
                  client-payload: |
                      {
                          "internal_name": "MemoUploader",
                          "version": "${{ steps.version.outputs.version }}",
                          "download_url": "https://github.com/open-xiv/memo-uploader/releases/download/v${{ steps.version.outputs.version }}/latest.zip"
                      }

    notify:
        needs: [build]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Compute status
              id: s
              run: |
                  if [[ "${{ needs.build.result }}" == "success" ]]; then
                    echo "status=success" >> "$GITHUB_OUTPUT"
                  else
                    echo "status=failure" >> "$GITHUB_OUTPUT"
                  fi
            - uses: open-xiv/gha-actions/notify-deploy@v1
              with:
                  status: ${{ steps.s.outputs.status }}
                  service: memo-uploader
                  kind: release
                  version: v${{ needs.build.outputs.version }}
                  cluster: dalamud
                  build: ${{ needs.build.result }}
                  webhook_token: ${{ secrets.GHA_WEBHOOK_TOKEN }}
